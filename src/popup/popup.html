<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="../../src/styles/common.css">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <div class="timer-display" id="timerDisplay">5:00</div>
    <div class="controls">
      <button id="startBtn" class="btn">Start</button>
      <button id="pauseBtn" class="btn" disabled>Pause</button>
      <button id="resetBtn" class="btn">Reset</button>
    </div>
    <input type="number" id="customTime" placeholder="Minutes" min="1" max="180">
    <button id="setBtn" class="btn secondary">Set Time</button>
  </div>
  <script src="../../src/utils/timer.js"></script>
  <script src="../../src/utils/storage.js"></script>
  <script src="popup.js"></script>
</body>
</html>
